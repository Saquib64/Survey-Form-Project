<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>
<body>
    <h1 id="title">Survey Form web-page</h1>
    <p id="description">Survery Form Web-page built using diffrent HTML, elements and attributes.</p>
    <form id="survey-form"> 
        <fieldset>
                <legend>Enter Your Details Below</legend>
                
                <label for="name" id="name-label">Enter Your Name:</label>
                <input id="name" type="text" placeholder="Saquib" required>
                
                <label for="email" id="email-label">Enter Your Email:</label>
                <input id="email" type="email" placeholder="Saquib65@gmail.com" required >
                
                <label for="number" id="number-label">Enter Your Age:</label>
                <input id="number" type="number" placeholder="e.g = 23" min="3" max="120" >

                <label for="dropdown">Select Your Gender</label>
                <select id="dropdown" name="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                </select>

                <p>Are You Indian?</p>
                <input type="radio" id="yes" name="nationality" value="yes">
                <label for="yes">Yes</label>
                <input type="radio" id="no" name="nationality" value="no">
                <label for="no">No</label>
                
                <br>

                <p>Select Your Education</p>
                <input type="checkbox" value="primary-edu" id="primary" name="edu">
                <label for="primary">Primary</label>
                
                <input type="checkbox" value="secondary-edu" id="secondary" name="edu">
                <label for="secondary">Secondary</label>    
                
                <br>

                <label for="comment">About Yourself</label>
                <br>
                <textarea id="comment" name="comment" placeholder="Tell us about yourself..."></textarea>
                <br>
                <button id="submit" type="submit">Submit</button>
        </fieldset>
    </form>

</body>
</html>
